<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DEAL! Sales Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F2F2F7;--surface:#FFF;--surface2:#EFEFEF;--surface3:#E5E5EA;
  --border:rgba(0,0,0,.08);--text:#0A0A0A;--text2:#636366;--text3:#AEAEB2;
  --red:#a90402;--rs:rgba(169,4,2,.07);--rm:rgba(169,4,2,.14);--rb:rgba(169,4,2,.25);
  --indigo:#040925;--ibg:rgba(4,9,37,.07);--imb:rgba(4,9,37,.14);
  --green:#1C7A4A;--gbg:rgba(28,122,74,.08);
  --blue:#0A68D4;--bbg:rgba(10,104,212,.07);
  --amber:#C07000;--abg:rgba(192,112,0,.07);
  --purple:#6B3DC5;--pbg:rgba(107,61,197,.07);
  --sh-sm:0 1px 8px rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.09),0 8px 32px rgba(0,0,0,.05);
  --r-sm:10px;--r-md:16px;--r-lg:20px;--r-xl:26px;--rpill:100px;
  --font:'IBM Plex Sans Thai',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.55;min-height:100vh}
/* ── GLASS ICON ── */
.gi{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0;margin-bottom:10px}
.gi::before{content:'';position:absolute;inset:0;border-radius:12px;opacity:.18}
.gi::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;filter:blur(8px);opacity:.4;top:-4px;right:-4px}
.gi svg{position:relative;z-index:1;width:20px;height:20px}
.gi-red{background:linear-gradient(135deg,rgba(169,4,2,.12),rgba(169,4,2,.04));color:var(--red)}.gi-red::before{background:var(--red)}.gi-red::after{background:var(--red)}
.gi-green{background:linear-gradient(135deg,rgba(28,122,74,.12),rgba(28,122,74,.04));color:var(--green)}.gi-green::before{background:var(--green)}.gi-green::after{background:var(--green)}
.gi-blue{background:linear-gradient(135deg,rgba(10,104,212,.12),rgba(10,104,212,.04));color:var(--blue)}.gi-blue::before{background:var(--blue)}.gi-blue::after{background:var(--blue)}
.gi-amber{background:linear-gradient(135deg,rgba(192,112,0,.12),rgba(192,112,0,.04));color:var(--amber)}.gi-amber::before{background:var(--amber)}.gi-amber::after{background:var(--amber)}
.gi-purple{background:linear-gradient(135deg,rgba(107,61,197,.12),rgba(107,61,197,.04));color:var(--purple)}.gi-purple::before{background:var(--purple)}.gi-purple::after{background:var(--purple)}
/* ── EMAIL TEMPLATE ── */
.email-modal{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.email-modal.open{display:flex}
.email-preview{background:#fff;border-radius:var(--r-xl);width:620px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.email-header{padding:24px 28px 16px;border-bottom:3px solid var(--red)}
.email-header h2{color:var(--red);font-size:20px;font-weight:700;margin:0}
.email-body{padding:24px 28px}
.email-body p{font-size:14px;line-height:1.7;color:#333;margin-bottom:12px}
.email-body .email-info-box{background:#f8f8f8;border-radius:10px;padding:14px 18px;margin:14px 0}
.email-body .email-info-row{display:flex;gap:16px;font-size:13px;padding:4px 0}
.email-body .email-info-row .label{font-weight:600;color:#666;min-width:100px}
.email-body .email-info-row .value{font-weight:700;color:#222}
.email-footer{padding:18px 28px;border-top:1px solid #eee;font-size:12px;color:#999;text-align:center}
.email-footer a{color:var(--red);text-decoration:none;font-weight:600}
.email-actions{display:flex;gap:10px;padding:0 28px 20px;justify-content:flex-end}
/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#040925 0%,#1a0d2e 50%,var(--red) 100%)}
.login-box{background:var(--surface);border-radius:var(--r-xl);padding:40px;width:400px;box-shadow:var(--sh-md);text-align:center}
.login-logo{font-size:42px;font-weight:700;color:var(--red);letter-spacing:1px;margin-bottom:2px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.form-group{margin-bottom:14px;text-align:left}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-size:14px;font-family:var(--font);color:var(--text);transition:border .2s;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--red);background:var(--surface)}
.btn-red{padding:12px 24px;border:none;background:var(--red);color:#fff;border-radius:var(--r-md);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;width:100%}
.btn-red:hover{opacity:.88}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:var(--rpill);width:auto}
.btn-ghost{padding:7px 14px;border:1.5px solid var(--border);background:transparent;color:var(--text2);border-radius:var(--rpill);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--red);color:var(--red)}
.err-msg{color:var(--red);font-size:13px;margin-top:8px;display:none}
.toggle-link{color:var(--red);cursor:pointer;font-size:13px;font-weight:500}
.toggle-form{font-size:13px;color:var(--text2);margin-top:16px}
/* ── APP ── */
.app{display:none}
.header{background:rgba(242,242,247,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:58px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;border-radius:9px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px}.logo-name span{color:var(--red)}
.hright{display:flex;align-items:center;gap:8px}
.hpill{background:var(--surface2);border-radius:var(--rpill);padding:5px 12px;font-size:11px;color:var(--text2);font-weight:500}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--gbg);border-radius:var(--rpill);padding:5px 11px;font-size:11px;font-weight:700;color:var(--green)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.icon-btn{width:36px;height:36px;border-radius:var(--r-sm);border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .18s;font-family:var(--font);font-size:13px}
.icon-btn:hover{background:var(--red);color:#fff;transform:scale(1.04)}
/* ── TABS ── */
.tab-strip{padding:10px 24px 8px;display:flex;align-items:center;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-strip::-webkit-scrollbar{display:none}
.tab-btn{display:flex;align-items:center;gap:5px;padding:8px 18px;border:1.5px solid var(--border);background:var(--surface);font-family:var(--font);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-radius:var(--rpill);transition:all .18s;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tab-btn:hover{border-color:var(--rm);color:var(--red);background:var(--rs)}
.tab-btn.active{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 2px 8px rgba(169,4,2,.25)}
.main{padding:22px 24px;max-width:1400px;margin:0 auto}
.sec-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}
/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px;margin-bottom:22px}
.kpi{background:var(--surface);border-radius:var(--r-lg);padding:17px 18px;box-shadow:var(--sh-sm);border:1px solid var(--border);transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.kpi-val{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1.15}
.kpi-lbl{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:2px}
/* ── CHART ── */
.charts-row{display:grid;grid-template-columns:1.35fr 1fr;gap:11px;margin-bottom:22px}
@media(max-width:860px){.charts-row{grid-template-columns:1fr}}
.chart-card{background:var(--surface);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh-sm);border:1px solid var(--border);margin-bottom:18px}
.chart-ttl{font-size:14px;font-weight:600;margin-bottom:2px}.chart-sub{font-size:11px;color:var(--text2)}
.chart-body{position:relative;height:220px}
/* ── HERO ── */
.hero-card{background:linear-gradient(135deg,var(--red) 0%,#8B0000 100%);border-radius:var(--r-xl);padding:24px 26px;margin-bottom:16px;box-shadow:0 4px 24px rgba(169,4,2,.3);color:#fff;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hero-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);border-radius:var(--rpill);padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:10px}
.hero-name{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.1;margin-bottom:4px}
.hero-sub{font-size:13px;opacity:.8}
.hero-right{text-align:right}
.hero-amt-lbl{font-size:11px;opacity:.7;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.hero-amt{font-size:36px;font-weight:700;letter-spacing:-1px;line-height:1.1}
.hero-rank-pill{display:inline-flex;align-items:center;gap:5px;margin-top:6px;background:rgba(255,255,255,.15);border-radius:var(--rpill);padding:4px 12px;font-size:12px;font-weight:600}
/* ── TABLE ── */
.tbl-card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-sm);border:1px solid var(--border);overflow:hidden;margin-bottom:22px}
.tbl-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.tbl-head-left{display:flex;align-items:center;gap:9px}
.tbl-title{font-size:14px;font-weight:700}
.cnt-pill{background:var(--rs);border-radius:var(--rpill);padding:2px 9px;font-size:11px;font-weight:700;color:var(--red)}
.tbl-scroll{overflow-x:auto;max-height:460px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:5}
th{background:var(--bg);color:var(--text2);font-weight:600;padding:9px 13px;font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap;text-align:left}
td{padding:8px 13px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--rs)}
.td-amt{color:var(--green);font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:3px 10px;border-radius:var(--rpill);font-size:11px;font-weight:600}
.badge-hot{background:rgba(169,4,2,.1);color:#a90402}
.badge-warm{background:rgba(192,112,0,.1);color:#C07000}
.badge-not_called,.badge-notcalled{background:rgba(229,161,0,.1);color:#E5A100}
.badge-cold{background:rgba(10,104,212,.1);color:#0A68D4}
.badge-customer{background:rgba(99,99,102,.1);color:#636366}
.badge-dropped{background:rgba(174,174,178,.1);color:#AEAEB2}
/* ── GAUGE ── */
.gauge-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px;margin-bottom:18px}
.gauge{text-align:center}
.gauge-ring{position:relative;width:80px;height:80px;margin:0 auto}
.gauge-ring svg{width:80px;height:80px;transform:rotate(-90deg)}
.gauge-ring circle{fill:none;stroke-width:8;cx:40;cy:40;r:36}
.gauge-ring .bg{stroke:var(--surface3)}
.gauge-ring .fg{stroke-linecap:round;transition:stroke-dashoffset .6s}
.gauge-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.gauge-lbl{font-size:11px;font-weight:600;margin-top:6px}
.gauge-sub{font-size:10px;color:var(--text3)}
/* ── FB ── */
.fb-summary{background:linear-gradient(135deg,#1877F2,#0d5bbd);border-radius:var(--r-lg);padding:22px;color:#fff;margin-bottom:18px}
.fb-summary h2{font-size:16px;margin-bottom:14px}
.fb-row{display:flex;gap:14px;flex-wrap:wrap}
.fb-kpi{text-align:center;min-width:80px}
.fb-kpi .num{font-size:20px;font-weight:700}
.fb-kpi .label{font-size:10px;opacity:.8;margin-top:2px}
.fb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:18px}
.fb-card{background:var(--surface);border-radius:var(--r-lg);padding:16px;box-shadow:var(--sh-sm);border:1px solid var(--border);border-left:4px solid var(--green)}
.fb-name{font-size:15px;font-weight:700;margin-bottom:10px}
.fb-stat{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.fb-stat-item{text-align:center}
.fb-stat-item .val{font-size:14px;font-weight:700}
.fb-stat-item .lbl{font-size:9px;color:var(--text3);margin-top:2px}
/* ── CDR ── */
.cdr-summary{background:linear-gradient(135deg,var(--green),#145a38);border-radius:var(--r-lg);padding:22px;color:#fff;margin-bottom:18px}
.cdr-summary h2{font-size:16px;margin-bottom:14px}
.cdr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:18px}
.cdr-card{background:var(--surface);border-radius:var(--r-lg);padding:16px;box-shadow:var(--sh-sm);border:1px solid var(--border);border-left:4px solid var(--green)}
.cdr-name{font-size:15px;font-weight:700;margin-bottom:10px}
.cdr-stat{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.cdr-stat-item{text-align:center}
.cdr-stat-item .val{font-size:14px;font-weight:700}
.cdr-stat-item .lbl{font-size:9px;color:var(--text3);margin-top:2px}
/* ── QUICK MODAL ── */
.qm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(5px);z-index:600;display:none;align-items:center;justify-content:center}
.qm-overlay.open{display:flex}
.qm-box{background:var(--surface);border-radius:var(--r-xl);width:90%;max-width:400px;overflow:hidden;box-shadow:var(--sh-md)}
.qm-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.qm-body{padding:16px 20px}
.qm-foot{display:flex;gap:8px;justify-content:flex-end;padding:12px 20px;border-top:1px solid var(--border)}
/* ── DEMO NOTIF ── */
.demo-notif-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:18px}
.demo-notif-card{padding:14px;border-radius:var(--r-sm);border-left:4px solid;background:var(--surface);box-shadow:var(--sh-sm)}
/* ── MONTH SELECTOR ── */
.month-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.month-pill{padding:6px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--rpill);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);color:var(--text2)}
.month-pill:hover{border-color:var(--rm);color:var(--red)}
.month-pill.active{background:var(--red);color:#fff;border-color:var(--red)}
/* ── PIPELINE FILTER ── */
.pipe-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pipe-pill{padding:6px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--rpill);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.pipe-pill.active{color:#fff}
.pipe-pill[data-s="HOT"]{color:#a90402;border-color:rgba(169,4,2,.3)}.pipe-pill[data-s="HOT"].active{background:#a90402;border-color:#a90402}
.pipe-pill[data-s="WARM"]{color:#C07000;border-color:rgba(192,112,0,.3)}.pipe-pill[data-s="WARM"].active{background:#C07000;border-color:#C07000}
.pipe-pill[data-s="NOT_CALLED"]{color:#E5A100;border-color:rgba(229,161,0,.3)}.pipe-pill[data-s="NOT_CALLED"].active{background:#E5A100;border-color:#E5A100}
.pipe-pill[data-s="COLD"]{color:#0A68D4;border-color:rgba(10,104,212,.3)}.pipe-pill[data-s="COLD"].active{background:#0A68D4;border-color:#0A68D4}
.pipe-pill[data-s="ALL"]{color:var(--text2)}.pipe-pill[data-s="ALL"].active{background:var(--text2);border-color:var(--text2)}
/* ── SEARCH ── */
.lead-search{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:var(--font);margin-bottom:12px;outline:none}
.lead-search:focus{border-color:var(--red)}
/* ── ACT BTNS ── */
.act-btns{display:flex;gap:4px}
.act-btn{width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.act-btn.chat{background:rgba(10,104,212,.1)}.act-btn.chat:hover{background:rgba(10,104,212,.2)}
.act-btn.call{background:rgba(28,122,74,.1)}.act-btn.call:hover{background:rgba(28,122,74,.2)}
/* ── FORM ── */
.form-card{background:var(--surface);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh-sm);border:1px solid var(--border);margin-bottom:18px}
.form-card h3{font-size:15px;font-weight:700;margin-bottom:14px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:10px}
.form-actions{display:flex;gap:8px;margin-top:14px}
/* ── LEADERBOARD ── */
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .12s}
.lb-row:last-child{border-bottom:none}.lb-row:hover{background:var(--bg)}.lb-row.me{background:var(--rs)!important}
.lb-rank{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:var(--bg);color:var(--text2)}
.lb-rank.r1{background:#FFD700;color:#7A5800}.lb-rank.r2{background:#C0C0C0;color:#666}.lb-rank.r3{background:#CD7F32;color:#5A3000}
.lb-name{flex:1;font-size:13px;font-weight:500}.lb-name.me-name{font-weight:700;color:var(--red)}
.lb-amt{font-size:13px;font-weight:700;color:var(--green)}
.lb-bar-wrap{width:70px;height:4px;border-radius:2px;background:var(--surface3)}.lb-bar{height:100%;border-radius:2px;background:var(--rm)}
/* ── TRACKER ── */
.tracker-card{background:var(--surface);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh-sm);border:1px solid var(--border);margin-bottom:18px}
.tracker-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:8px}
.tracker-fill{height:100%;border-radius:3px;transition:width .3s}
/* ── COMPARE CARD ── */
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:18px}
.cmp-card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden;transition:transform .15s;border:2px solid var(--border)}
.cmp-card:hover{transform:translateY(-2px)}
.cmp-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.cmp-body{padding:0 16px 16px}
.cmp-total{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.cmp-stat{background:var(--bg);border-radius:var(--r-sm);padding:8px 10px}

/* ═══ LIVE DATA from Google Sheet ═══ */
let liveData={total:0,rows:[],bySale:{},loading:true,lastUpdate:null};

function fetchLive(){
  const url=`https://docs.google.com/spreadsheets/d/${R.sheetId}/gviz/tq?tqx=${encodeURIComponent('out:json;responseHandler:__gc')}&gid=${R.gid}&range=A1:Z&headers=1`;
  const s=document.createElement('script');
  window.__gc=function(d){
    try{
      const headers=(d.table.cols||[]).map((c,i)=>(c.label||'').trim()||('Col'+i));
      const rows=(d.table.rows||[]).map(r=>{
        const o={};
        headers.forEach((h,i)=>{
          const cell=r.c?.[i];let v=cell?.v??null;
          if(typeof v==='string'&&v.startsWith('Date(')){
            const m=v.match(/Date\((\d+),(\d+),(\d+)/);
            if(m){v=new Date(+m[1],+m[2],+m[3]);o['_dt_'+h]=v;v=v.toLocaleDateString('th-TH')}
          }
          o[h]=v;
        });
        return o;
      }).filter(r=>Object.values(r).some(v=>v!=null&&v!==''));

      const amtCol=headers.find(h=>/ยอด|amount|เงิน|total|บาท/i.test(h))||'';
      const perCol=headers.find(h=>/เซลล์|sale|คน|ชื่อ|name|person/i.test(h))||'';
      const dtCol=headers.find(h=>rows.some(r=>r['_dt_'+h]))||'';

      const now=new Date(),day=now.getDate(),cm=now.getMonth(),cy=now.getFullYear();
      let csM=cm-(day>=26?0:1),csY=cy;if(csM<0){csM=11;csY--}
      const csDate=new Date(csY,csM,26);
      const ceM=cm+(day>=26?1:0);let ceY=cy;if(ceM>11){ceY++}
      const ceDate=new Date(ceY,ceM>11?0:ceM,25,23,59,59);

      const cycleRows=dtCol?rows.filter(r=>{const dt=r['_dt_'+dtCol];return dt&&dt>=csDate&&dt<=ceDate}):rows.slice(-50);

      let total=0;const bySale={};
      cycleRows.forEach(r=>{
        const amt=amtCol?parseFloat(String(r[amtCol]||'').replace(/,/g,''))||0:0;
        let per=perCol?String(r[perCol]||'').trim()||'ไม่ระบุ':'ไม่ระบุ';
        if(R.nameMap[per])per=R.nameMap[per];
        total+=amt;
        if(!bySale[per])bySale[per]={amt:0,count:0};
        bySale[per].amt+=amt;bySale[per].count++;
      });

      liveData={total,rows:cycleRows,bySale,loading:false,lastUpdate:new Date(),amtCol,perCol,dtCol,headers,csDate,ceDate};
      renderLiveBanner();
      const activeTab=document.querySelector('.tab-btn.active');
      if(activeTab)renderPage(activeTab.dataset.page);
    }catch(e){console.error('Sheet parse error',e);liveData.loading=false}
    s.remove();delete window.__gc;
  };
  s.onerror=()=>{liveData.loading=false;s.remove();delete window.__gc};
  document.head.appendChild(s);
  s.src=url;
}

function uploadCDR(){
  const inp=document.getElementById('cdrFile');
  if(!inp||!inp.files[0]){alert('เลือกไฟล์ CSV');return}
  const f=inp.files[0];const r=new FileReader();
  r.onload=e=>{
    const csv=e.target.result.replace(/^\ufeff/,'');
    const lines=csv.split('\n').filter(l=>l.trim());
    if(!lines.length){alert('ไฟล์ว่าง');return}
    const header=lines[0].split(',').map(h=>h.trim());
    const rows=lines.slice(1).map(line=>{
      const parts=line.split(',').map(p=>p.trim());const o={};
      header.forEach((h,i)=>o[h]=parts[i]||'');return o;
    });
    processCDRFromCSV(rows);
    inp.value='';alert('อัพโหลด CDR สำเร็จ · '+rows.length+' รายการ');
  };r.readAsText(f,'utf-8');
}

function parseDuration(str){
  if(!str||str==='0:00:00')return 0;
  const parts=str.split(':').map(p=>parseInt(p)||0);
  if(parts.length===3)return parts[0]*3600+parts[1]*60+parts[2];
  if(parts.length===2)return parts[0]*60+parts[1];return parts[0]||0;
}

function extractExtFromCaller(caller){
  if(!caller)return null;const m=caller.match(/<(\d+)>/);return m?m[1]:null;
}

function extractNameFromCaller(caller){
  if(!caller)return null;return caller.replace(/\s*<\d+>/,'').replace(/\(sale\)|\(CLT\)|\(CW\)/gi,'').trim();
}

function processCDRFromCSV(rows){
  const bySale={};const daily={};
  let totCalls=0,totAns=0,totMiss=0,totDur=0,durCount=0;
  rows.forEach(row=>{
    const caller=row['ชื่อผู้โทร']||'';
    const ext=extractExtFromCaller(caller);if(!ext)return;
    let name=extractNameFromCaller(caller);
    if(R.nameMap[name])name=R.nameMap[name];
    const status=row['สถานะ']||'';
    const durSec=parseDuration(row['ระยะเวลา']||'');
    const dateRaw=row['วันที่']||'';
    // Convert DD/MM/YYYY HH:MM:SS → YYYY-MM-DD
    let dateKey='';
    const dm=dateRaw.match(/(\d{2})\/(\d{2})\/(\d{4})/);
    if(dm)dateKey=dm[3]+'-'+dm[2]+'-'+dm[1];

    if(!bySale[name])bySale[name]={ext,total:0,answered:0,missed:0,totalDur:0,durCount:0,avgDuration:0};
    const s=bySale[name];s.total++;totCalls++;
    const isAns=status==='รับสาย';
    if(isAns){s.answered++;totAns++;if(durSec>0){s.totalDur+=durSec;s.durCount++;totDur+=durSec;durCount++}}
    else{s.missed++;totMiss++}
    if(dateKey){if(!daily[dateKey])daily[dateKey]={total:0,answered:0};daily[dateKey].total++;if(isAns)daily[dateKey].answered++}
  });
  Object.values(bySale).forEach(s=>{s.avgDuration=s.durCount>0?Math.round(s.totalDur/s.durCount):0;delete s.totalDur;delete s.durCount});
  const dailyArr=Object.entries(daily).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,v])=>({d,t:v.total,a:v.answered}));
  cdrData.bySale=bySale;
  cdrData.totals={totalCalls:totCalls,answered:totAns,missed:totMiss,avgDuration:durCount>0?Math.round(totDur/durCount):0};
  cdrData.daily=dailyArr;cdrData.rows=dailyArr;
  cdrData.lastUpdate=new Date().toISOString();
  const activeTab=document.querySelector('.tab-btn.active');if(activeTab)renderPage(activeTab.dataset.page);
}

function processZwizData(rows){
  zwizData={rows,bySale:{},totals:{contacts:rows.length,focusTagged:0,activeThisWeek:0},lastUpdate:new Date()};

/* ═══ CRM METRICS ═══ */
function calcMetrics(saleEmail){
  const leads=(DB.get('leads')||[]).filter(l=>l.by===saleEmail);
  const chats=(DB.get('chatLogs')||[]).filter(c=>c.by===saleEmail);
  const calls=(DB.get('callLogs')||[]).filter(c=>c.user===saleEmail);
  const customers=leads.filter(l=>l.status==='CUSTOMER');
  const hot=leads.filter(l=>l.status==='HOT').length;
  const warm=leads.filter(l=>l.status==='WARM').length;
  const cold=leads.filter(l=>l.status==='COLD').length;
  const notCalled=leads.filter(l=>l.status==='NOT_CALLED').length;
  const totalLeads=leads.length;const converted=customers.length;
  const convRate=totalLeads?converted/totalLeads*100:0;
  const revenue=customers.reduce((s,l)=>s+(l.val||0),0);
  const totalChats=chats.length;const totalCalls=calls.length;
  const chatsToday=chats.filter(c=>c.at?.startsWith(today())).length;
  const callsToday=calls.filter(c=>c.date?.startsWith(today())).length;
  const callsFromChat=calls.filter(c=>c.origin==='chat').length;
  const chatsWithCall=callsFromChat;
  const chatToCall=totalChats?callsFromChat/totalChats*100:0;
  // Avg time to call (from chatLeadAt to firstCallAt on leads)
  let ttcSum=0,ttcCount=0;
  leads.forEach(l=>{if(l.chatLeadAt&&l.firstCallAt){const diff=(new Date(l.firstCallAt)-new Date(l.chatLeadAt))/60000;if(diff>0){ttcSum+=diff;ttcCount++}}});
  const avgTimeToCall=ttcCount?ttcSum/ttcCount:0;
  // Avg lead age
  const now=new Date();let ageSum=0,ageCount=0;
  customers.forEach(l=>{if(l.closedAt&&l.at){const days=(new Date(l.closedAt)-new Date(l.at))/864e5;if(days>=0){ageSum+=days;ageCount++}}});
  const avgLeadAge=ageCount?ageSum/ageCount:0;
  return {totalLeads,totalChats,totalCalls,chatsToday,callsToday,customers:converted,converted,hot,warm,cold,notCalled,convRate,revenue,callsFromChat,chatsWithCall,chatToCall,avgTimeToCall,avgLeadAge};
}

}

/* ═══ LEAD ALERTS ═══ */
function checkLeadAlerts(){
  const leads=allLeads(),notifs=DB.get('notifications')||[],now=new Date(),d=today();
  const statusThresholds={HOT:2,WARM:4,NOT_CALLED:3,COLD:7};

  leads.forEach(lead=>{
    if(lead.status==='CUSTOMER'||lead.status==='DROPPED')return;
    if(lead.by!==CU.email)return;

    const lastUpdate=new Date(lead.updatedAt||lead.at);
    const daysSinceUpdate=Math.floor((now-lastUpdate)/864e5);
    const threshold=statusThresholds[lead.status]||0;

    if(daysSinceUpdate>=threshold){
      const key=`alert_${lead.id}_${d}`;
      if(!notifs.find(n=>n.key===key)){
        const statusLabel={HOT:'HOT',WARM:'WARM',COLD:'COLD'}[lead.status];
        notifs.unshift({
          key,
          type:'warn',
          msg:`Lead "${lead.cust}" (${statusLabel}) ไม่อัพเดตมา ${daysSinceUpdate} วัน`,
          target:lead.by,
          leadId:lead.id,
          at:new Date().toISOString()
        });
      }
    }
  });

  DB.set('notifications',notifs);
}

/* ── Escalation ── */
function checkEsc(){
  const users=DB.get('users')||[],leads=allLeads(),calls=DB.get('callLogs')||[];
  const sales=users.filter(u=>isSale(u.role)),mgr=users.find(u=>u.role==='manager'),exec=users.find(u=>u.role==='executive');
  const now=new Date(),notifs=DB.get('notifications')||[];
  sales.forEach(s=>{
    const myL=leads.filter(p=>p.by===s.email).sort((a,b)=>(b.at||'').localeCompare(a.at||''));
    const myC=calls.filter(c=>c.user===s.email).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const last=Math.max(myL[0]?new Date(myL[0].at).getTime():0,myC[0]?new Date(myC[0].date).getTime():0);
    if(!last)return;
    const days=Math.floor((now-last)/864e5),d=today();
    if(days>=5&&exec&&!notifs.find(n=>n.key===`e5_${s.email}_${d}`)){
      notifs.unshift({key:`e5_${s.email}_${d}`,type:'danger',msg:`${s.name} ไม่มีกิจกรรมมา ${days} วัน`,target:exec.email,at:new Date().toISOString()});
    }else if(days>=3&&mgr&&!notifs.find(n=>n.key===`e3_${s.email}_${d}`)){
      notifs.unshift({key:`e3_${s.email}_${d}`,type:'warn',msg:`${s.name} ไม่มีกิจกรรมมา ${days} วัน`,target:mgr.email,at:new Date().toISOString()});
    }else if(days>=1&&!notifs.find(n=>n.key===`e1_${s.email}_${d}`)){
      notifs.unshift({key:`e1_${s.email}_${d}`,type:'info',msg:`คุณไม่ได้กรอกข้อมูลเมื่อวาน`,target:s.email,at:new Date().toISOString()});
    }
  });
  DB.set('notifications',notifs);
}

function addLead(){
  const c=document.getElementById('lCust').value.trim(),v=parseFloat(document.getElementById('lVal').value)||0;
  if(!c){alert('กรุณากรอกชื่อลูกค้า');return}
  const leads=DB.get('leads')||[];
  if(editingLeadId){
    const idx=leads.findIndex(l=>l.id===editingLeadId);
    if(idx>=0){
      const old=leads[idx];
      const changes=[];
      const newCust=c,newPhone=document.getElementById('lPhone').value.trim(),newType=document.getElementById('lType').value,newVal=v,newStat=document.getElementById('lStat').value,newLoc=document.getElementById('lLoc').value.trim(),newNote=document.getElementById('lNote').value.trim();
      if(old.cust!==newCust)changes.push('ชื่อ: '+old.cust+'→'+newCust);
      if(old.phone!==newPhone)changes.push('เบอร์: '+(old.phone||'-')+'→'+newPhone);
      if(old.type!==newType)changes.push('ตู้: '+old.type+'→'+newType);
      if(old.val!==newVal)changes.push('มูลค่า: ฿'+fmtB(old.val)+'→฿'+fmtB(newVal));
      if(old.status!==newStat)changes.push('สถานะ: '+old.status+'→'+newStat);
      if(old.loc!==newLoc)changes.push('โลเคชัน: '+(old.loc||'-')+'→'+newLoc);
      if(old.note!==newNote)changes.push('หมายเหตุ: '+(old.note||'-')+'→'+newNote);
      if(!old.history)old.history=[];
      old.history.push({at:new Date().toISOString(),by:CU.name,changes:changes.join(', ')||'ไม่มีการเปลี่ยนแปลง'});
      old.cust=newCust;old.phone=newPhone;old.type=newType;old.val=newVal;old.status=newStat;old.loc=newLoc;old.note=newNote;old.updatedAt=new Date().toISOString();
      leads[idx]=old;
      logAct('lead-edit',`${CU.name} แก้ไข Lead: ${c} [${changes.join(', ')}]`);
    }
    editingLeadId=null;
  }else{
    leads.push({id:Date.now(),cust:c,phone:document.getElementById('lPhone').value.trim(),type:document.getElementById('lType').value,val:v,status:document.getElementById('lStat').value,loc:document.getElementById('lLoc').value.trim(),note:document.getElementById('lNote').value.trim(),by:CU.email,byName:CU.name,at:new Date().toISOString(),month:new Date().getMonth()});
    logAct('lead',`${CU.name} เพิ่ม Lead: ${c}`);
  }
  DB.set('leads',leads);renderPage('newLead');
}

    document.getElementById('lCust').value=lead.cust||'';
    document.getElementById('lPhone').value=lead.phone||'';
    document.getElementById('lType').value=lead.type||'ตู้เตะ+ต่อย';
    document.getElementById('lVal').value=lead.val||0;
    document.getElementById('lStat').value=lead.status||'COLD';
    document.getElementById('lLoc').value=lead.loc||'';
    document.getElementById('lNote').value=lead.note||'';
    document.getElementById('leadFormTitle').textContent='แก้ไข Lead: '+lead.cust;
    document.getElementById('leadSubmitBtn').textContent='💾 บันทึกการแก้ไข';
    document.getElementById('leadCancelBtn').style.display='inline-flex';
    document.getElementById('leadFormCard').style.borderColor='var(--amber)';

  },50);

function cancelEdit(){

function showLeadHistory(id){
  const leads=DB.get('leads')||[];

/* ═══ ALERTS ═══ */
function pgAlerts(){
  const notifs=(DB.get('notifications')||[]).slice(0,30),emails=(DB.get('emailLog')||[]).slice(0,20);
  const users=DB.get('users')||[];
  const sales=users.filter(u=>isSale(u.role));

  // Get overdue lead counts per sale
  const overduePerSale=sales.map(s=>{
    const overdue=allLeads().filter(l=>{
      if(l.by!==s.email||l.status==='CUSTOMER'||l.status==='DROPPED')return false;
      const d=Math.floor((new Date()-new Date(l.updatedAt||l.at))/864e5);
      const th={HOT:2,WARM:4,COLD:7};
      return d>=(th[l.status]||999);

    return {user:s,count:overdue.length};

    <div class="alert alert-info">ระบบแจ้งเตือน: 1 วัน → Sale · 3 วัน → หัวหน้า · 5 วัน → ผู้บริหาร · Lead: HOT 2วัน, WARM 4วัน, COLD 7วัน</div>

              <div class="kpi-lbl">${x.count} Lead เกินกำหนด</div>
            </div>
            <div style="font-size:22px">📧</div>
          </div>
          <div style="font-size:11px;color:var(--red);margin-top:6px;font-weight:600">คลิกเพื่อส่ง Email แจ้งเตือน →</div>

/* ═══ FILTER LEAD TABLE ═══ */
function filterLeadTable(q){

        ${(()=>{const pm=phoneMatch[selMonth];const sm=salesMonthly[selMonth];const tA=mainSales.reduce((s,n)=>(zwizFunnel[n]?.[selMonth]?.a||0)+s,0);const tP=mainSales.reduce((s,n)=>(zwizFunnel[n]?.[selMonth]?.p||0)+s,0);const tCalled=pm?mainSales.reduce((s,n)=>(pm[n]?.called||0)+s,0):0;const tAnswered=pm?mainSales.reduce((s,n)=>(pm[n]?.answered||0)+s,0):0;const tNot=pm?mainSales.reduce((s,n)=>(pm[n]?.notCalled||0)+s,0):0;const tPhones=pm?mainSales.reduce((s,n)=>(pm[n]?.phones||0)+s,0):0;const tAmt=sm?mainSales.reduce((s,n)=>(sm[n]?.amt||0)+s,0):0;const tSlip=sm?mainSales.reduce((s,n)=>(sm[n]?.slips||0)+s,0):0;return `<tr style="font-weight:700;border-top:2px solid var(--text2)"><td>รวม</td><td style="text-align:center">${tA.toLocaleString()}</td><td style="text-align:center">${tP}</td><td></td><td style="text-align:center">${tPhones>0?tCalled+'/'+tPhones:'-'}</td><td style="text-align:center">${tPhones>0?Math.round(tCalled/tPhones*100)+'%':'-'}</td><td style="text-align:center;color:var(--green)">${tAnswered||'-'}</td><td style="text-align:center;color:var(--red)">${tNot||'-'}</td><td class="td-amt">฿${sm?fmtB(tAmt):'-'}</td><td style="text-align:center">${sm?tSlip:'-'}</td><td></td></tr>`})()}
      </tbody>
    </table></div></div>

    ${dupesCount>0?`
    <div class="sec-lbl">ตรวจพบเบอร์ซ้ำ (${dupesCount} เบอร์)</div>
    <div class="tbl-card"><div class="tbl-scroll"><table>
      <thead><tr><th>#</th><th>เบอร์โทร</th><th>เจ้าของ (ซ้ำกัน)</th><th>จำนวนคน</th></tr></thead>
      <tbody>
        ${zwiz.dupes.map((d,i)=>`<tr><td>${i+1}</td><td style="font-weight:700;font-family:monospace">${d.p}</td><td>${d.o.join(', ')}</td><td style="text-align:center"><span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:var(--abg);color:var(--amber)">${d.o.length}</span></td></tr>`).join('')}
      </tbody>
    </table></div></div>
    `:''}
  `;
}

/* ═══ CDR INSIGHT (Boss) — เฉพาะ Sale หลัก + KPI Funnel ═══ */
function pgCDRInsight(){
  // Get available months from cdrMonthly
  const availMonths=Object.keys(cdrMonthly).sort();
  const hasMonthData=cdrMonthly[selMonth];

  if(!hasMonthData){
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div><h2 style="font-size:18px;font-weight:700">📞 CDR — ข้อมูลการโทร (Sale หลัก)</h2><div style="font-size:12px;color:var(--text3)">แสดงเฉพาะ แนน, แหม่ม, มิว, หมีพูห์</div></div>
        <div style="display:flex;gap:8px">
          <select id="cdrMonthSelect" onchange="selMonth=this.value;renderPage('cdrInsight')" style="padding:6px 10px;border:1px solid var(--text2);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px">
            ${availMonths.map(m=>`<option value="${m}" ${m===selMonth?'selected':''}>${monthLabel(m)}</option>`).join('')}
          </select>
          <input type="file" id="cdrFile" accept=".csv" style="display:none" onchange="uploadCDR()">
          <button class="btn-red btn-sm" onclick="document.getElementById('cdrFile').click()">📤 อัพโหลด CDR CSV</button>
        </div>
      </div>
      <div style="text-align:center;padding:60px 20px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:12px">📞</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:6px">ยังไม่มีข้อมูล CDR เดือนนี้</div>
        <div style="font-size:13px">กรุณาอัพโหลด CDR CSV เพื่อนำเข้าข้อมูลการโทรจาก YaleCom</div>
      </div>
    `;
  }

  const cdr=hasMonthData;
  const salesM=salesMonthly[selMonth];
  const saleNames=mainSales.filter(n=>cdr.bySale?.[n]);
  let mTotal=0,mAns=0,mMiss=0,mDurSum=0,mDurCnt=0;
  saleNames.forEach(n=>{const d=cdr.bySale[n];mTotal+=d.total;mAns+=d.answered;mMiss+=d.missed;if(d.avgDuration>0){mDurSum+=d.avgDuration*d.answered;mDurCnt+=d.answered}});
  const mAvgDur=mDurCnt>0?Math.round(mDurSum/mDurCnt):0;
  const mAnsRate=mTotal>0?Math.round(mAns/mTotal*100):0;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><h2 style="font-size:18px;font-weight:700">📞 CDR — ข้อมูลการโทร (Sale หลัก)</h2><div style="font-size:12px;color:var(--text3)">แสดงเฉพาะ แนน, แหม่ม, มิว, หมีพูห์${cdr.lastUpdate?' · อัพเดต: '+new Date(cdr.lastUpdate).toLocaleString('th-TH'):''}</div></div>
      <div style="display:flex;gap:8px">
        <select id="cdrMonthSelect" onchange="selMonth=this.value;renderPage('cdrInsight')" style="padding:6px 10px;border:1px solid var(--text2);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px">
          ${availMonths.map(m=>`<option value="${m}" ${m===selMonth?'selected':''}>${monthLabel(m)}</option>`).join('')}
        </select>
        <input type="file" id="cdrFile" accept=".csv" style="display:none" onchange="uploadCDR()">
        <button class="btn-red btn-sm" onclick="document.getElementById('cdrFile').click()">📤 อัพโหลด CDR CSV</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px">
      <div class="kpi"><div class="kpi-lbl">📞 โทรทั้งหมด</div><div class="kpi-val">${mTotal}</div></div>
      <div class="kpi"><div class="kpi-lbl">✅ ติดต่อได้</div><div class="kpi-val" style="color:var(--green)">${mAns}</div></div>
      <div class="kpi"><div class="kpi-lbl">❌ ไม่ได้รับ</div><div class="kpi-val" style="color:var(--red)">${mMiss}</div></div>
      <div class="kpi"><div class="kpi-lbl">⏱ Avg สนทนา</div><div class="kpi-val">${mAvgDur>0?Math.floor(mAvgDur/60)+'น. '+mAvgDur%60+'วิ':'-'}</div></div>
      <div class="kpi"><div class="kpi-lbl">📈 Answer Rate</div><div class="kpi-val" style="color:${mAnsRate>=60?'var(--green)':'var(--red)'}"> ${mAnsRate}%</div></div>
    </div>

    <div class="sec-lbl">รายบุคคล</div>
    <div class="tbl-card"><div class="tbl-scroll"><table>
      <thead><tr><th>Sale</th><th>Ext</th><th>โทรทั้งหมด</th><th>ติดต่อได้</th><th>ไม่ได้รับ</th><th>Avg สนทนา</th><th>Answer Rate</th></tr></thead>
      <tbody>
        ${saleNames.map(n=>{
          const d=cdr.bySale[n];
          const ansRate=d.total>0?Math.round(d.answered/d.total*100):0;
          const avgMin=d.avgDuration>0?Math.floor(d.avgDuration/60)+'น.'+d.avgDuration%60+'วิ':'-';
          return `<tr><td><strong>${n}</strong></td><td>${d.ext||'-'}</td><td>${d.total}</td><td style="color:var(--green);font-weight:700">${d.answered}</td><td style="color:var(--red)">${d.missed}</td><td>${avgMin}</td><td><span style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:${ansRate>=60?'var(--gbg)':'var(--rs)'};color:${ansRate>=60?'var(--green)':'var(--red)'}">${ansRate}%</span></td></tr>`;
        }).join('')}
      </tbody>
    </table></div></div>

    <div class="sec-lbl">📊 KPI Funnel: Active แชท → เบอร์ → โทร → ปิดยอด (${monthLabel(selMonth)})</div>
    <div class="tbl-card"><div class="tbl-scroll"><table>
      <thead><tr style="background:var(--indigo);color:#fff"><th>Sale</th><th>💬 Active แชท</th><th>📱 ได้เบอร์</th><th>% ขอเบอร์</th><th>📞 โทรแล้ว/เบอร์</th><th>% โทรครบ</th><th>✅ ติดต่อได้</th><th>❌ ยังไม่โทร</th><th>💰 ยอดขาย</th><th>📝 สลิป</th></tr></thead>
      <tbody>
        ${mainSales.map(n=>{
          const zf=zwizFunnel[n]?.[selMonth]||{c:0,a:0,p:0};
          const pm=phoneMatch[selMonth]?.[n]||{phones:0,called:0,answered:0,notCalled:0};
          const sf=salesM?.[n]||{amt:0,slips:0};
          const pctPhone=zf.a>0?(zf.p/zf.a*100).toFixed(1):'-';
          const pctCalled=pm.phones>0?Math.round(pm.called/pm.phones*100):'-';
          return `<tr>
            <td><strong>${n}</strong></td>
            <td style="text-align:center">${zf.a.toLocaleString()}</td>
            <td style="text-align:center;font-weight:700">${zf.p}</td>
            <td style="text-align:center"><span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:${parseFloat(pctPhone)>=5?'var(--gbg)':'var(--rs)'};color:${parseFloat(pctPhone)>=5?'var(--green)':'var(--red)'}">${pctPhone}%</span></td>
            <td style="text-align:center;font-weight:700">${pm.phones>0?pm.called+'/'+pm.phones:'-'}</td>
            <td style="text-align:center"><span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:${pctCalled==='-'?'var(--surface2)':pctCalled>=80?'var(--gbg)':pctCalled>=50?'var(--abg)':'var(--rs)'};color:${pctCalled==='-'?'var(--text2)':pctCalled>=80?'var(--green)':pctCalled>=50?'var(--amber)':'var(--red)'}">${pctCalled==='-'?'-':pctCalled+'%'}</span></td>
            <td style="text-align:center;color:var(--green);font-weight:700">${pm.answered||'-'}</td>
            <td style="text-align:center;color:var(--red);font-weight:700">${pm.notCalled||'-'}</td>
            <td class="td-amt">฿${sf.amt?fmtB(sf.amt):'-'}</td>
            <td style="text-align:center">${sf.slips||'-'}</td>
          </tr>`;
        }).join('')}
        ${(()=>{const pm=phoneMatch[selMonth];const tA=mainSales.reduce((s,n)=>(zwizFunnel[n]?.[selMonth]?.a||0)+s,0);const tP=mainSales.reduce((s,n)=>(zwizFunnel[n]?.[selMonth]?.p||0)+s,0);const tCalled=pm?mainSales.reduce((s,n)=>(pm[n]?.called||0)+s,0):0;const tAnswered=pm?mainSales.reduce((s,n)=>(pm[n]?.answered||0)+s,0):0;const tNot=pm?mainSales.reduce((s,n)=>(pm[n]?.notCalled||0)+s,0):0;const tPhones=pm?mainSales.reduce((s,n)=>(pm[n]?.phones||0)+s,0):0;return `<tr style="font-weight:700;border-top:2px solid var(--text2)"><td>รวม</td><td style="text-align:center">${tA.toLocaleString()}</td><td style="text-align:center">${tP}</td><td></td><td style="text-align:center">${tPhones>0?tCalled+'/'+tPhones:'-'}</td><td style="text-align:center">${tPhones>0?Math.round(tCalled/tPhones*100)+'%':'-'}</td><td style="text-align:center;color:var(--green)">${tAnswered||'-'}</td><td style="text-align:center;color:var(--red)">${tNot||'-'}</td><td class="td-amt">฿${salesM?fmtB(mainSales.reduce((s,n)=>(salesM[n]?.amt||0)+s,0)):'-'}</td><td style="text-align:center">${salesM?mainSales.reduce((s,n)=>(salesM[n]?.slips||0)+s,0):'-'}</td></tr>`})()}
      </tbody>
    </table></div></div>

    <div class="sec-lbl">กราฟโทรรายวัน</div>
    <div class="chart-card"><div class="chart-body" style="height:260px"><canvas id="cdrChart"></canvas></div></div>
  `;
}

function initCDRChart(){
  const c=document.getElementById('cdrChart');if(!c)return;
  const daily=cdrData.daily||[];if(!daily.length)return;
  CH.cdr=new Chart(c,{type:'line',data:{
    labels:daily.map(x=>x.d.slice(5)),
    datasets:[
      {label:'โทรทั้งหมด',data:daily.map(x=>x.t),borderColor:'var(--red)',backgroundColor:'rgba(169,4,2,.1)',fill:true,tension:.3,pointRadius:3},
      {label:'ติดต่อได้',data:daily.map(x=>x.a),borderColor:'var(--green)',backgroundColor:'rgba(28,122,74,.1)',fill:true,tension:.3,pointRadius:3}
    ]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},scales:{y:{beginAtZero:true}}}});
}

  const logs=(DB.get('activityLog')||[]).slice(0,50);
  return `<div class="sec-lbl">Activity Log</div>${logs.length?`<div class="tbl-card"><div class="tbl-scroll"><table><thead><tr><th>เวลา</th><th>ประเภท</th><th>รายละเอียด</th><th>ผู้ใช้</th></tr></thead><tbody>${logs.map(l=>`<tr><td style="white-space:nowrap">${new Date(l.at).toLocaleString('th-TH')}</td><td>${l.type}</td><td>${l.desc}</td><td>${l.user}</td></tr>`).join('')}</tbody></table></div></div>`:'<div style="text-align:center;padding:30px;color:var(--text3)">ยังไม่มี</div>'}`;
}
